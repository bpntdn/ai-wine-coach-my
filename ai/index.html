<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI葡萄酒社交教練</title>
  <meta name="description" content="像 ChatGPT 一樣直覺的葡萄酒社交教練" />
  <style>
    :root {
      --bg: #140d0f;
      --panel: #1b1417;
      --panel-soft: #251b1f;
      --text: #f8f7f6;
      --muted: #c7bab4;
      --brand: #c7a15d;
      --line: rgba(199, 161, 93, 0.24);
      --user: #39282e;
      --assistant: #21181b;
      --danger: #ef8e8e;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .layout {
      display: flex;
      width: 100%;
      height: 100dvh;
      background: radial-gradient(120% 70% at 50% 0%, #3b1f26 0%, #1a1114 38%, #120b0d 100%);
    }

    .sidebar {
      width: 280px;
      border-right: 1px solid var(--line);
      background: rgba(20, 12, 15, 0.82);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sb-top {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(46, 30, 36, .8);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }

    .btn:hover { border-color: rgba(199, 161, 93, .68); }

    .sb-list {
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chat-item {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 9px 10px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.02);
    }

    .chat-item.active {
      border-color: rgba(199, 161, 93, .5);
      background: rgba(199, 161, 93, .08);
    }

    .chat-title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .chat-time {
      font-size: 11px;
      color: var(--muted);
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(24, 14, 17, 0.86);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid rgba(199, 161, 93, 0.52);
      background: #2a1b1f;
      flex-shrink: 0;
    }

    .logo-fallback {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--brand);
      border: 1px solid rgba(199, 161, 93, 0.52);
      font-weight: 700;
      background: #2a1b1f;
      flex-shrink: 0;
    }

    .title { font-size: 16px; font-weight: 600; }
    .subtitle { font-size: 12px; color: var(--muted); }

    .auth-pill {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px 118px;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: min(820px, 95%);
      margin: 0 auto 14px;
      padding: 14px 15px;
      border-radius: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
      border: 1px solid var(--line);
      font-size: 15px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .16);
    }

    .bubble.user {
      margin-left: auto;
      margin-right: 0;
      background: var(--user);
    }

    .bubble.assistant {
      margin-left: 0;
      margin-right: auto;
      background: var(--assistant);
    }

    .composer {
      position: fixed;
      left: 280px;
      right: 0;
      bottom: 0;
      border-top: 1px solid var(--line);
      background: rgba(24, 14, 18, .9);
      backdrop-filter: blur(14px);
      padding: 10px;
      z-index: 20;
    }

    .composer-inner {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 16px;
      padding: 9px;
      max-width: 980px;
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      min-height: 46px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.55;
      padding: 9px 8px;
    }

    .send {
      border: 1px solid rgba(199, 161, 93, .62);
      background: rgba(199, 161, 93, .18);
      color: #fff;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
    }

    .send:disabled { opacity: .45; cursor: not-allowed; }

    .typing { display: inline-flex; gap: 5px; align-items: center; }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      animation: blink 1s infinite ease-in-out;
      opacity: .4;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes blink {
      0%, 100% { transform: translateY(0); opacity: .3; }
      50% { transform: translateY(-2px); opacity: 1; }
    }

    .auth-mask {
      position: fixed;
      inset: 0;
      background: rgba(10, 7, 8, .76);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .auth-card {
      width: min(460px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #1a1215;
      padding: 16px;
    }

    .auth-card h3 { margin: 0 0 8px 0; }
    .auth-card p { margin: 0 0 10px 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .auth-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #241a1f;
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .auth-err { color: var(--danger); font-size: 12px; min-height: 18px; }

    @media (max-width: 920px) {
      .sidebar { display: none; }
      .composer { left: 0; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sb-top">
        <button id="newChatBtn" class="btn" type="button">+ 新對話</button>
      </div>
      <div id="chatList" class="sb-list"></div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="brand">
          <img id="brandLogo" class="logo" src="./logo.png" alt="品牌 Logo" />
          <div id="logoFallback" class="logo-fallback">酒</div>
          <div>
            <div class="title">AI葡萄酒社交教練</div>
            <div class="subtitle">像 ChatGPT 一樣自然的對話體驗</div>
          </div>
        </div>
        <div id="authPill" class="auth-pill">尚未登入</div>
      </header>

      <main id="chat" class="chat"></main>
    </div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" placeholder="輸入你的情境。Enter 送出，Shift+Enter 換行"></textarea>
      <button id="sendBtn" class="send" type="button">送出</button>
    </div>
  </div>

  <div id="authMask" class="auth-mask">
    <div class="auth-card">
      <h3>使用者驗證</h3>
      <p>請輸入你被核准的 Email。只有在名單中的帳號可以使用此系統。</p>
      <input id="emailInput" class="auth-input" type="email" placeholder="you@example.com" />
      <button id="emailSubmit" class="btn" type="button">進入系統</button>
      <div id="authErr" class="auth-err"></div>
    </div>
  </div>

  <script>
    // 中文註解：前端白名單可做第一層擋用戶（真正權限由後端 env APPROVED_EMAILS 再擋一次）
    const FRONTEND_APPROVED_EMAILS = [
      'you@example.com'
    ];

    const LOCAL_KB = [
      {
        tags: ['商務', '壓價', '客戶', '談判', '價格'],
        answer: `商務壓價時先穩關係再談數字。\n\n步驟 1：先同理壓力。\n步驟 2：把焦點轉到價值與風險。\n步驟 3：給兩個可選方案（保留價值版 / 預算優先版）。\n\n可直接說：\n「我理解你對預算很敏感，我們先保住最關鍵成果，我給你兩個版本比較好決策。」`
      },
      {
        tags: ['約會', '第一次', '破冰', '尷尬', '聊天'],
        answer: `第一次約會重點是低壓互動。\n\n步驟 1：先聊感受，不先問履歷。\n步驟 2：用選擇題問題。\n步驟 3：酒款選安全易飲。\n\n可直接說：\n「今天想走輕鬆路線，你偏果香感還是清爽型？」`
      }
    ];

    const STORAGE_KEY = 'wine-coach-chats-v1';
    const USER_KEY = 'wine-coach-user-email';

    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const chatListEl = document.getElementById('chatList');
    const newChatBtn = document.getElementById('newChatBtn');
    const logoEl = document.getElementById('brandLogo');
    const logoFallbackEl = document.getElementById('logoFallback');
    const authPillEl = document.getElementById('authPill');

    const authMaskEl = document.getElementById('authMask');
    const emailInputEl = document.getElementById('emailInput');
    const emailSubmitEl = document.getElementById('emailSubmit');
    const authErrEl = document.getElementById('authErr');

    let busy = false;
    let composing = false;
    let userEmail = localStorage.getItem(USER_KEY) || '';
    let chats = [];
    let activeChatId = null;

    logoEl.addEventListener('error', function () {
      logoEl.style.display = 'none';
      logoFallbackEl.style.display = 'flex';
    });

    function nowLabel(ts) {
      const d = new Date(ts);
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${m}/${day} ${hh}:${mm}`;
    }

    function getActiveChat() {
      return chats.find(c => c.id === activeChatId) || null;
    }

    function saveChats() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
    }

    function loadChats() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (Array.isArray(parsed) && parsed.length) {
          chats = parsed;
          activeChatId = parsed[0].id;
          return;
        }
      } catch {}
      createChat(true);
    }

    function extractTitle(messages) {
      const firstUser = messages.find(m => m.role === 'user');
      if (!firstUser) return '新對話';
      return firstUser.content.replace(/\s+/g, ' ').slice(0, 20) || '新對話';
    }

    function createChat(withWelcome) {
      const id = 'chat-' + Date.now();
      const messages = [];
      if (withWelcome) {
        messages.push({
          role: 'assistant',
          content: '你好，我是你的 AI 葡萄酒社交教練。\n\n告訴我你的場景，我會給你：\n1) 可直接使用的下一句\n2) 多方案策略\n3) 一句關鍵反問。',
          ts: Date.now()
        });
      }
      const item = { id, createdAt: Date.now(), updatedAt: Date.now(), title: '新對話', messages };
      chats.unshift(item);
      activeChatId = id;
      saveChats();
      renderSidebar();
      renderMessages();
    }

    function switchChat(id) {
      activeChatId = id;
      renderSidebar();
      renderMessages();
      inputEl.focus();
    }

    function renderSidebar() {
      chatListEl.innerHTML = '';
      chats.forEach(c => {
        c.title = extractTitle(c.messages);
        const row = document.createElement('div');
        row.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
        row.innerHTML = `<div class="chat-title">${escapeHtml(c.title)}</div><div class="chat-time">${nowLabel(c.updatedAt)}</div>`;
        row.addEventListener('click', function () { switchChat(c.id); });
        chatListEl.appendChild(row);
      });
    }

    function renderMessages() {
      const chat = getActiveChat();
      chatEl.innerHTML = '';
      if (!chat) return;
      chat.messages.forEach(m => addBubble(m.role, m.content));
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addBubble(role, text) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + role;
      bubble.textContent = text;
      chatEl.appendChild(bubble);
    }

    function addTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'bubble assistant';
      wrap.id = 'typing';
      wrap.innerHTML = '<span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function removeTyping() {
      const node = document.getElementById('typing');
      if (node) node.remove();
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function autoGrow() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
    }

    function tokenize(text) {
      return text.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, ' ').split(/\s+/).filter(Boolean);
    }

    function localRetrieve(query) {
      const q = query.toLowerCase();
      const qTokens = tokenize(query);
      return LOCAL_KB.map((row) => {
        let score = 0;
        for (const tag of row.tags) {
          if (q.includes(tag.toLowerCase())) score += 2;
          for (const tok of qTokens) {
            if (tag.toLowerCase().includes(tok) || tok.includes(tag.toLowerCase())) score += 1;
          }
        }
        return { ...row, score };
      }).filter(x => x.score > 0).sort((a, b) => b.score - a.score).slice(0, 3);
    }

    function buildLocalFallback(query, hits) {
      if (hits.length) {
        return hits[0].answer + '\n\n如果你願意，我可以直接把這段改成「你下一句可直接貼出」版本。';
      }
      return `我先接住你的問題：「${query.slice(0, 36)}${query.length > 36 ? '…' : ''}」。\n\n先補我兩件事：\n1) 場景（商務/約會/朋友）\n2) 你要的結果（成交/破冰/修復）\n\n我就給你完整方案。`;
    }

    async function askCoach(message) {
      const chat = getActiveChat();
      const hits = localRetrieve(message);
      const payload = {
        message,
        user_email: userEmail,
        local_context: hits.map((h) => ({ tags: h.tags, answer: h.answer })),
        history: (chat?.messages || []).slice(-8).map(m => ({ role: m.role, content: m.content }))
      };

      try {
        const resp = await fetch('/.netlify/functions/coach-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await resp.json().catch(() => null);
        if (!resp.ok || !data || !data.reply) {
          if (resp.status === 403) {
            return { text: '你目前沒有使用權限，請聯絡管理員將你的 Email 加入核准名單。' };
          }
          throw new Error(data?.error || 'server_failed');
        }
        return { text: data.reply };
      } catch {
        return { text: buildLocalFallback(message, hits) };
      }
    }

    async function sendMessage(raw) {
      if (busy) return;
      const text = (raw || inputEl.value || '').trim();
      if (!text) return;
      const chat = getActiveChat();
      if (!chat) return;

      busy = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      autoGrow();

      const userMsg = { role: 'user', content: text, ts: Date.now() };
      chat.messages.push(userMsg);
      chat.updatedAt = Date.now();
      saveChats();
      renderSidebar();
      renderMessages();

      addTyping();
      const reply = await askCoach(text);
      removeTyping();

      chat.messages.push({ role: 'assistant', content: reply.text, ts: Date.now() });
      chat.updatedAt = Date.now();
      saveChats();
      renderSidebar();
      renderMessages();

      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function showAuthMask(show) {
      authMaskEl.style.display = show ? 'flex' : 'none';
    }

    function validateFrontEmail(email) {
      const n = String(email || '').trim().toLowerCase();
      if (!n.includes('@')) return false;
      if (!FRONTEND_APPROVED_EMAILS.length) return true;
      return FRONTEND_APPROVED_EMAILS.map(x => x.toLowerCase()).includes(n);
    }

    function applyUser(email) {
      userEmail = email.trim().toLowerCase();
      localStorage.setItem(USER_KEY, userEmail);
      authPillEl.textContent = userEmail;
    }

    function bootAuth() {
      if (userEmail) {
        applyUser(userEmail);
        showAuthMask(false);
        return;
      }
      showAuthMask(true);
    }

    emailSubmitEl.addEventListener('click', function () {
      const email = emailInputEl.value.trim();
      if (!validateFrontEmail(email)) {
        authErrEl.textContent = '此 Email 尚未被核准，請聯絡管理員。';
        return;
      }
      authErrEl.textContent = '';
      applyUser(email);
      showAuthMask(false);
      inputEl.focus();
    });

    newChatBtn.addEventListener('click', function () {
      createChat(true);
      inputEl.focus();
    });

    sendBtn.addEventListener('click', function () { sendMessage(); });

    inputEl.addEventListener('compositionstart', function () { composing = true; });
    inputEl.addEventListener('compositionend', function () { composing = false; });
    inputEl.addEventListener('input', autoGrow);
    inputEl.addEventListener('keydown', function (e) {
      // 中文註解：與 ChatGPT 輸入習慣一致，Enter 送出，Shift+Enter 換行
      if (composing || e.isComposing || e.keyCode === 229) return;
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    loadChats();
    renderSidebar();
    renderMessages();
    bootAuth();
    autoGrow();
  </script>
</body>
</html>

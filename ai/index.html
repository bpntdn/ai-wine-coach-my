<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI葡萄酒社交教練</title>
  <meta name="description" content="像 ChatGPT 一樣直覺的葡萄酒社交教練" />
  <style>
    :root {
      --bg: #140d0f;
      --panel: #1b1417;
      --panel-soft: #251b1f;
      --text: #f8f7f6;
      --muted: #c7bab4;
      --brand: #c7a15d;
      --line: rgba(199, 161, 93, 0.24);
      --user: #39282e;
      --assistant: #21181b;
      --ok: #82d3a1;
      --danger: #ef8e8e;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 980px;
      margin: 0 auto;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: radial-gradient(120% 70% at 50% 0%, #3b1f26 0%, #1a1114 38%, #120b0d 100%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(24, 14, 17, 0.86);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid rgba(199, 161, 93, 0.52);
      background: #2a1b1f;
      flex-shrink: 0;
    }

    .logo-fallback {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--brand);
      border: 1px solid rgba(199, 161, 93, 0.52);
      font-weight: 700;
      background: #2a1b1f;
      flex-shrink: 0;
    }

    .title-wrap { min-width: 0; }
    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: .5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .subtitle {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(46, 30, 36, .8);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover { border-color: rgba(199, 161, 93, .68); }

    .status { display: none; }

    .status.ok { color: var(--ok); }
    .status.bad { color: var(--danger); }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 18px 122px;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: min(760px, 92%);
      margin: 0 auto 14px;
      padding: 14px 15px;
      border-radius: 16px;
      line-height: 1.82;
      white-space: pre-wrap;
      border: 1px solid var(--line);
      font-size: 15px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .16);
    }

    .bubble.user {
      margin-left: auto;
      margin-right: 0;
      background: var(--user);
    }

    .bubble.assistant {
      margin-left: 0;
      margin-right: auto;
      background: var(--assistant);
    }

    .meta {
      margin: -4px 0 10px;
      font-size: 11px;
      color: rgba(231, 215, 205, .62);
    }

    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      animation: blink 1s infinite ease-in-out;
      opacity: .4;
    }

    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }

    @keyframes blink {
      0%, 100% { transform: translateY(0); opacity: .3; }
      50% { transform: translateY(-2px); opacity: 1; }
    }

    .composer {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(980px, 100%);
      border-top: 1px solid var(--line);
      background: rgba(24, 14, 18, .9);
      backdrop-filter: blur(14px);
      padding: 11px 12px;
      z-index: 20;
    }

    .composer-inner {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 16px;
      padding: 9px;
      max-width: 960px;
      margin: 0 auto;
      box-shadow: 0 10px 34px rgba(0, 0, 0, .22);
    }

    textarea {
      flex: 1;
      min-height: 46px;
      max-height: 160px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.55;
      padding: 9px 8px;
    }

    textarea::placeholder { color: #8d90a0; }

    .send {
      border: 1px solid rgba(199, 161, 93, .62);
      background: rgba(199, 161, 93, .18);
      color: #fff;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
    }

    .send:disabled { opacity: .45; cursor: not-allowed; }

    @media (min-width: 1200px) {
      .app { max-width: 1100px; }
      .composer { width: min(1100px, 100%); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img id="brandLogo" class="logo" src="./logo.png" alt="品牌 Logo" />
        <div id="logoFallback" class="logo-fallback">酒</div>
        <div class="title-wrap">
          <div class="title">AI葡萄酒社交教練</div>
          <div class="subtitle">像日常聊天一樣直覺的社交對話體驗</div>
        </div>
      </div>
      <div class="top-actions">
        <button id="newChatBtn" class="btn" type="button">清除對話</button>
      </div>
    </header>

    <main id="chat" class="chat"></main>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" placeholder="輸入你的真實情境，我會給你可直接使用的下一句與策略"></textarea>
      <button id="sendBtn" class="send" type="button">送出</button>
    </div>
  </div>

  <script>
    const LOCAL_KB = [
      {
        tags: ['商務', '壓價', '客戶', '談判', '價格'],
        answer: `商務壓價時先穩關係再談數字。

步驟 1：先同理壓力（「我懂你要對內交代成本」）。
步驟 2：把焦點轉到價值與風險（交付品質、售後、時程）。
步驟 3：給兩個可選方案（保留價值版 / 預算優先版）。

可直接說：
「我理解你對預算很敏感，我們可以一起把最關鍵的成果先保住；要不要我給你兩個版本，讓你更好對內報告？」`
      },
      {
        tags: ['約會', '第一次', '破冰', '尷尬', '聊天'],
        answer: `第一次約會的重點是「低壓互動」。

步驟 1：先聊感受，不先問履歷。
步驟 2：用選擇題問題，讓對方容易接話。
步驟 3：酒款選安全易飲（氣泡或高酸白酒）。

可直接說：
「今天想走輕鬆路線，你比較偏果香感，還是乾淨清爽型？」`
      },
      {
        tags: ['麻辣鍋', '火鍋', '餐酒', '配酒', '辣'],
        answer: `麻辣鍋優先選高酸、微甜或低單寧酒，避免辣感被放大。

建議：Riesling（微甜）/ 氣泡酒 / 果香型 Rosé。
避免：高單寧厚重紅酒。

可直接說：
「麻辣鍋我會選一支高酸或微甜酒，口感會更舒服，也比較不會越喝越辣。」`
      },
      {
        tags: ['送禮', '長輩', '禮貌', '社交禮儀'],
        answer: `送長輩的核心是「得體」與「好入口」。

建議：中等酒體、口感圓潤、品牌辨識度高。
遞禮話術：先表心意，不強調價格。

可直接說：
「這支是我挑的順口款，想說您平常聚餐也好搭，請您品看看。」`
      },
      {
        tags: ['冷場', '破冰', '社交', '尷尬'],
        answer: `冷場救援先做三件事：
1) 描述現場可見細節（料理/酒香/環境）
2) 丟一個低門檻問題
3) 接對方答案再延伸一層

可直接說：
「這道菜香氣滿特別的，你平常比較常吃這種風格嗎？」`
      }
    ];

    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const logoEl = document.getElementById('brandLogo');
    const logoFallbackEl = document.getElementById('logoFallback');

    let busy = false;
    let conversation = [];

    logoEl.addEventListener('error', function () {
      logoEl.style.display = 'none';
      logoFallbackEl.style.display = 'flex';
    });

    function setStatus() {}

    function autoGrow() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    }

    // 中文註解：把滑鼠滾輪捲動明確導向聊天區，避免在輸入區附近無法滾動
    document.addEventListener('wheel', function (e) {
      const inChat = e.target && e.target.closest && e.target.closest('.chat');
      if (inChat) return;
      chatEl.scrollTop += e.deltaY;
      e.preventDefault();
    }, { passive: false });

    function addBubble(role, text, meta = '') {
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + role;
      bubble.textContent = text;
      chatEl.appendChild(bubble);
      if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'meta';
        metaEl.textContent = meta;
        chatEl.appendChild(metaEl);
      }
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'bubble assistant';
      wrap.id = 'typing';
      wrap.innerHTML = '<span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function removeTyping() {
      const node = document.getElementById('typing');
      if (node) node.remove();
    }

    function tokenize(text) {
      return text
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s]/gu, ' ')
        .split(/\s+/)
        .filter(Boolean);
    }

    function localRetrieve(query) {
      const q = query.toLowerCase();
      const qTokens = tokenize(query);
      const ranked = LOCAL_KB
        .map((row) => {
          let score = 0;
          for (const tag of row.tags) {
            if (q.includes(tag.toLowerCase())) score += 2;
            for (const tok of qTokens) {
              if (tag.toLowerCase().includes(tok) || tok.includes(tag.toLowerCase())) score += 1;
            }
          }
          return { ...row, score };
        })
        .filter((x) => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

      return ranked;
    }

    function buildLocalFallback(query, hits) {
      const qShort = query.length > 50 ? query.slice(0, 50) + '…' : query;
      if (hits.length) {
        const top = hits[0];
        return top.answer + '\n\n你這題我抓到的關鍵是：「' + qShort + '」。若你願意，我可以直接幫你寫成「下一句可直接貼出去」的版本。';
      }
      const generic = [
        '我先幫你把問題拆成三段：場景、目標、對方風格。你先告訴我「誰在場」和「你最怕哪個瞬間」。',
        '這題可以解，我先抓重點：你是想破冰、說服，還是修復關係？你選一個，我就給你對應話術。',
        '我理解你的卡點。先補兩個資訊：對方是偏強勢還是偏保守？你想要的結果是成交、升溫，還是維持禮貌？'
      ];
      return generic[(query.length + conversation.length) % generic.length];
    }

    async function askCoach(message) {
      const hits = localRetrieve(message);
      const payload = {
        message,
        local_context: hits.map((h) => ({ tags: h.tags, answer: h.answer })),
        history: conversation.slice(-8)
      };

      try {
        const resp = await fetch('/.netlify/functions/coach-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await resp.json().catch(() => null);
        if (!resp.ok || !data || !data.reply) {
          throw new Error(data?.error || 'server_failed');
        }

        return { text: data.reply, meta: '', ok: true };
      } catch (err) {
        const fallback = buildLocalFallback(message, hits);
        return { text: fallback, meta: '', ok: false };
      }
    }

    async function sendMessage(raw) {
      if (busy) return;
      const text = (raw || inputEl.value || '').trim();
      if (!text) return;

      busy = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      autoGrow();

      addBubble('user', text);
      conversation.push({ role: 'user', content: text });

      addTyping();
      const reply = await askCoach(text);
      removeTyping();

      addBubble('assistant', reply.text, reply.meta);
      conversation.push({ role: 'assistant', content: reply.text });

      setStatus(reply.ok ? '連線正常，已進入精品對話模式' : '目前使用本地備援，請檢查 OPENAI_API_KEY', reply.ok ? 'ok' : 'bad');

      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function resetChat() {
      conversation = [];
      chatEl.innerHTML = '';
      addBubble('assistant', `你好，我是你的 AI 葡萄酒社交教練。

你只要描述真實情境，我會回你：
1) 可直接使用的下一句
2) 背後策略
3) 需要時補網路最新資訊

你可以直接開始問，例如：
「老闆在場、客戶壓價，我下一句要怎麼說？」`);
    }

    inputEl.addEventListener('input', autoGrow);
    // 中文註解：輸入體驗對齊聊天工具：Enter 送出、Shift+Enter 換行，並避免中文選字時誤送出
    inputEl.addEventListener('keydown', function (e) {
      if (e.isComposing) return;
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', function () { sendMessage(); });

    document.getElementById('newChatBtn').addEventListener('click', function () {
      resetChat();
      setStatus('已建立新對話', 'ok');
      inputEl.focus();
    });

    resetChat();
    setStatus('就緒：單一對話視窗，手機與電腦皆可清楚操作', 'ok');
    inputEl.focus();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maenads</title>
  <meta name="description" content="梅娜斯陪你梳理餐桌上的話題、人情與選酒靈感——簡練、真心、有餘韻。" />
  <meta name="theme-color" content="#0e0c0c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Maenads" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0c0c;
      --panel: #161314;
      --panel-elevated: #1c1819;
      --text: #f4f0eb;
      --muted: #9a908a;
      --brand: #c6a667;
      --brand-soft: rgba(198, 166, 103, 0.14);
      --line: rgba(198, 166, 103, 0.14);
      --line-strong: rgba(198, 166, 103, 0.28);
      --user: #2a2224;
      --assistant: #181516;
      --danger: #c98a8a;
      --font-body: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'PingFang TC', sans-serif;
      --font-display: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-x: none;
      touch-action: pan-y;
    }

    .layout {
      display: flex;
      width: 100%;
      height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(ellipse 90% 55% at 50% -15%, rgba(80, 52, 42, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse 70% 40% at 100% 80%, rgba(45, 35, 30, 0.25) 0%, transparent 50%),
        linear-gradient(180deg, #121010 0%, #0a0909 100%);
    }

    .sidebar {
      width: 268px;
      border-right: 1px solid var(--line);
      background: rgba(12, 10, 10, 0.72);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sb-top {
      padding: 18px 14px 14px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line-strong);
      background: transparent;
      color: var(--text);
      border-radius: 2px;
      padding: 11px 14px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: var(--brand);
      background: var(--brand-soft);
      color: var(--text);
    }

    .sb-list {
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-item {
      border: 1px solid transparent;
      border-radius: 2px;
      padding: 11px 12px;
      cursor: pointer;
      background: transparent;
      transition: border-color 0.2s, background 0.2s;
    }

    .chat-item:hover {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.02);
    }

    .chat-item.active {
      border-color: var(--line-strong);
      background: var(--brand-soft);
    }

    .chat-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .chat-time {
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.06em;
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 22px 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 9, 9, 0.75);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--line-strong);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35), 0 8px 28px rgba(0, 0, 0, 0.35);
      background: var(--panel);
      flex-shrink: 0;
    }

    .logo-fallback {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--brand);
      border: 1px solid var(--line-strong);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 18px;
      background: var(--panel);
      flex-shrink: 0;
    }

    .brand-text { min-width: 0; }
    .title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin: 0;
    }
    .subtitle {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-top: 4px;
      text-transform: uppercase;
    }

    .auth-pill {
      font-size: 11px;
      font-family: inherit;
      font-weight: 400;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 16px;
      white-space: nowrap;
      background: transparent;
      cursor: pointer;
      max-width: min(100%, 260px);
      text-overflow: ellipsis;
      overflow: hidden;
      letter-spacing: 0.08em;
      transition: border-color 0.2s, color 0.2s;
    }
    .auth-pill:hover {
      border-color: var(--brand);
      color: var(--text);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .topbar-btn {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      padding: 8px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .topbar-btn:hover {
      border-color: var(--brand);
      color: var(--text);
      background: var(--brand-soft);
    }

    .mode-pill {
      font-size: 11px;
      font-family: inherit;
      font-weight: 400;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      white-space: nowrap;
      letter-spacing: 0.08em;
      margin-right: 8px;
    }
    .mode-pill.live {
      color: #79d7a1;
      border-color: rgba(121, 215, 161, 0.45);
      background: rgba(121, 215, 161, 0.08);
    }
    .mode-pill.fallback {
      color: #f0c987;
      border-color: rgba(240, 201, 135, 0.45);
      background: rgba(240, 201, 135, 0.08);
    }

    /* 中文註解：側欄遮罩（僅窄螢幕抽屜模式） */
    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.48);
      z-index: 54;
      backdrop-filter: blur(2px);
    }

    .layout.sidebar-open .sidebar-backdrop {
      display: block;
    }

    /* 中文註解：手機專用左上角抽屜按鈕（類 ChatGPT 側欄操作） */
    .sidebar-fab {
      display: none;
      position: fixed;
      top: auto;
      bottom: calc(158px + env(safe-area-inset-bottom, 0px));
      left: max(12px, env(safe-area-inset-left, 0px));
      z-index: 60;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: rgba(14, 12, 12, 0.88);
      color: var(--text);
      font-family: inherit;
      font-size: 17px;
      line-height: 1;
      width: 34px;
      height: 34px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(10px);
    }

    /* 中文註解：手機固定「新對話」浮動按鈕，長對話也可隨時開新線 */
    .new-chat-fab {
      display: none;
      position: fixed;
      top: auto;
      bottom: calc(158px + env(safe-area-inset-bottom, 0px));
      right: max(12px, env(safe-area-inset-right, 0px));
      left: auto;
      z-index: 60;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(14, 12, 12, 0.88);
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.08em;
      min-width: 88px;
      height: 36px;
      padding: 0 14px;
      cursor: pointer;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(10px);
      white-space: nowrap;
      text-overflow: clip;
      overflow: visible;
    }

    .layout.sidebar-open .sidebar-fab {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-8px);
    }
    .layout.sidebar-open .new-chat-fab {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-8px);
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 22px 18px 128px;
      overscroll-behavior: contain;
      overscroll-behavior-x: none;
      scroll-behavior: auto;
      touch-action: pan-y;
    }

    .bubble {
      max-width: min(720px, 94%);
      margin: 0 auto 18px;
      padding: 18px 20px;
      border-radius: 2px;
      line-height: 1.85;
      white-space: pre-wrap;
      border: 1px solid var(--line);
      font-size: 15px;
      font-weight: 400;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .bubble.user {
      margin-left: auto;
      margin-right: 0;
      background: var(--user);
      border-color: rgba(198, 166, 103, 0.12);
    }

    .bubble.assistant {
      margin-left: 0;
      margin-right: auto;
      background: var(--assistant);
    }

    .composer {
      position: fixed;
      left: 268px;
      right: 0;
      bottom: 0;
      border-top: 1px solid var(--line);
      background: rgba(10, 9, 9, 0.82);
      backdrop-filter: blur(20px);
      padding: 14px 18px calc(18px + env(safe-area-inset-bottom, 0px));
      z-index: 20;
      overflow-x: hidden;
    }

    .composer-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      border: 1px solid var(--line-strong);
      background: var(--panel-elevated);
      border-radius: 2px;
      padding: 10px 12px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    textarea {
      flex: 1;
      min-height: 48px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.55;
      padding: 10px 8px;
    }

    .send {
      border: 1px solid var(--brand);
      background: transparent;
      color: var(--brand);
      border-radius: 2px;
      padding: 10px 22px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }

    .send:hover:not(:disabled) {
      background: var(--brand);
      color: var(--bg);
    }

    .send:disabled { opacity: .38; cursor: not-allowed; }

    .typing { display: inline-flex; gap: 6px; align-items: center; }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--brand);
      animation: blink 1.2s infinite ease-in-out;
      opacity: .35;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes blink {
      0%, 100% { transform: translateY(0); opacity: .25; }
      50% { transform: translateY(-3px); opacity: 1; }
    }

    .auth-mask {
      position: fixed;
      inset: 0;
      background: rgba(6, 5, 5, 0.82);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      /* 中文註解：須高於側欄抽屜，登入時遮住對話列表 */
      z-index: 80;
    }

    .auth-card {
      width: min(420px, calc(100vw - 32px));
      border: 1px solid var(--line-strong);
      border-radius: 2px;
      background: linear-gradient(165deg, #171516 0%, #121010 100%);
      padding: 28px 26px 26px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .auth-card-title {
      font-family: var(--font-display);
      font-size: 1.65rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      margin: 0 0 8px 0;
      color: var(--text);
    }
    .auth-card-lede {
      margin: 0 0 22px 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 300;
      line-height: 1.65;
      letter-spacing: 0.03em;
    }
    .auth-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 400;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .auth-input:focus {
      outline: none;
      border-color: var(--line-strong);
    }
    .auth-input::placeholder {
      color: rgba(154, 144, 138, 0.65);
    }
    /* 中文註解：通行碼／Email 欄右側顯示切換 */
    .auth-field-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .auth-field-wrap .auth-input {
      margin-bottom: 0;
      padding-right: 52px;
    }
    .auth-eye {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: auto;
      min-width: 36px;
      height: 30px;
      border: none;
      border-radius: 2px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.08em;
      line-height: 1;
      padding: 0 6px;
      font-family: inherit;
    }
    .auth-eye:hover {
      color: var(--brand);
    }
    .auth-err {
      color: var(--danger);
      font-size: 12px;
      font-weight: 400;
      min-height: 20px;
      margin-top: 10px;
      letter-spacing: 0.02em;
    }
    .auth-line-help {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
      margin: 0 0 18px 0;
      letter-spacing: 0.03em;
    }
    .auth-line-help a {
      color: var(--brand);
      text-decoration: none;
      border-bottom: 1px solid rgba(198, 166, 103, 0.45);
      padding-bottom: 1px;
    }
    .auth-line-help a:hover {
      color: var(--text);
      border-bottom-color: var(--brand);
    }

    @media (max-width: 920px) {
      /* 中文註解：側欄改為抽屜，保留對話紀錄與「新對話」—勿再用 display:none 弄丟功能 */
      .layout {
        display: block;
        position: relative;
        height: 100svh;
        width: 100vw;
        max-width: 100vw;
        overflow-x: hidden;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(288px, 88vw);
        height: 100svh;
        z-index: 55;
        transform: translateX(-102%);
        transition: transform 0.28s ease;
        box-shadow: none;
        border-right: 1px solid var(--line);
      }

      .layout.sidebar-open .sidebar {
        transform: translateX(0);
        box-shadow: 12px 0 48px rgba(0, 0, 0, 0.35);
      }

      .topbar {
        position: fixed;
        left: 0;
        right: 0;
        width: 100vw;
        z-index: 56;
        gap: 10px;
        padding: calc(12px + env(safe-area-inset-top, 0px)) 12px 12px 50px;
      }
      .subtitle { display: none; }
      .title { font-size: 1.18rem; }
      .logo, .logo-fallback { width: 34px; height: 34px; }
      .brand { gap: 10px; margin-left: 0; padding-left: 0; }
      .topbar-actions { display: none; }
      .mode-pill { display: none; }
      .auth-pill {
        display: none !important;
      }
      .sidebar-fab { display: inline-flex; }
      .new-chat-fab { display: inline-flex; align-items: center; }

      .composer {
        left: 0;
        right: 0;
        width: 100vw;
        max-width: 100vw;
        bottom: 0;
        padding-bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      }
      .chat {
        padding-top: calc(82px + env(safe-area-inset-top, 0px));
        padding-bottom: calc(140px + env(safe-area-inset-bottom, 0px));
        max-width: 100vw;
      }
      .main, .layout, .chat, .composer, .composer-inner {
        max-width: 100vw;
      }
      .sb-top { padding-left: 14px; }
    }

    /* 中文註解：iPhone Safari（非安裝成主畫面）底部工具列較高，補更多底部安全距離避免遮住輸入框 */
    @media (max-width: 920px) and (display-mode: browser) {
      .composer {
        bottom: 0;
        padding-bottom: calc(66px + env(safe-area-inset-bottom, 0px));
      }
      .chat {
        padding-bottom: calc(190px + env(safe-area-inset-bottom, 0px));
      }
      .sidebar-fab,
      .new-chat-fab {
        bottom: calc(210px + env(safe-area-inset-bottom, 0px));
      }
    }

    body.is-browser-mobile .composer {
      bottom: 0;
      padding-bottom: calc(66px + env(safe-area-inset-bottom, 0px));
    }
    body.is-browser-mobile .chat {
      padding-bottom: calc(190px + env(safe-area-inset-bottom, 0px));
    }
    body.is-browser-mobile .sidebar-fab,
    body.is-browser-mobile .new-chat-fab {
      bottom: calc(210px + env(safe-area-inset-bottom, 0px));
    }
  </style>
</head>
<body>
  <div id="appLayout" class="layout">
    <button
      id="sidebarFabBtn"
      class="sidebar-fab"
      type="button"
      title="開啟對話紀錄"
      aria-label="開啟對話紀錄"
      aria-expanded="false"
    >☰</button>
    <button id="newChatFabBtn" class="new-chat-fab" type="button" title="快速開新對話" aria-label="快速開新對話">新對話</button>

    <aside class="sidebar" aria-label="對話列表">
      <div class="sb-top">
        <button id="newChatBtn" class="btn" type="button">新對話</button>
        <button id="authSidebarBtn" class="btn" type="button">已登入 · 設定</button>
      </div>
      <div id="chatList" class="sb-list"></div>
    </aside>

    <div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>

    <div class="main">
      <header class="topbar">
        <div class="brand">
          <img id="brandLogo" class="logo" src="./logo.png" alt="梅娜斯 Maenads" />
          <div id="logoFallback" class="logo-fallback">M</div>
          <div class="brand-text">
            <div class="title">Maenads</div>
            <div class="subtitle">葡萄酒 · 餐桌 · 從容</div>
          </div>
        </div>
        <div class="topbar-actions">
          <button type="button" id="chatListToggleBtn" class="topbar-btn" title="查看歷史對話">對話紀錄</button>
          <button type="button" id="newChatTopBtn" class="topbar-btn" title="開始一則新對話">新對話</button>
        </div>
        <span id="modePill" class="mode-pill fallback" title="目前回覆模式">備援模式</span>
        <button type="button" id="authPill" class="auth-pill" title="登入或變更設定">請先登入</button>
      </header>

      <main id="chat" class="chat"></main>
    </div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" placeholder="寫下你的想法⋯ Enter 傳送 · Shift+Enter 換行"></textarea>
      <button id="sendBtn" class="send" type="button">傳送</button>
    </div>
  </div>

  <div id="authMask" class="auth-mask">
    <div class="auth-card">
      <h3 class="auth-card-title">進入沙龍</h3>
      <p class="auth-card-lede">請輸入專屬通行碼；若曾留下聯絡信箱，可一併填寫以便核對身分。</p>
      <div class="auth-field-wrap">

    function tokenize(text) {
      return text.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, ' ').split(/\s+/).filter(Boolean);
    }

    function localRetrieve(query) {
      const q = query.toLowerCase();
      const qTokens = tokenize(query);
      return LOCAL_KB.map((row) => {
        let score = 0;
        for (const tag of row.tags) {
          if (q.includes(tag.toLowerCase())) score += 2;
          for (const tok of qTokens) {
            if (tag.toLowerCase().includes(tok) || tok.includes(tag.toLowerCase())) score += 1;
          }
        }
        return { ...row, score };
      })
        .filter((x) => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);
    }

    function topicFromQuery(q) {
      const t = String(q || '').trim();
      if (!t) return '你的問題';
      if (t.length > 40) return t.slice(0, 40) + '…';
      return t;
    }

    /** opts.catchUnknown：進入 catch（網路例外／JSON 例外）時為 true，避免只剩一句話 */
    function buildLocalFallback(query, hits, opts) {
      opts = opts || {};
      if (hits.length) {
        return hits[0].answer + '\n\n若你需要，我可以再幫你改成「下一句就能說出口」的版本。';
      }
      const topic = topicFromQuery(query);
      if (/文化|禮儀|用餐|餐桌|習慣|約會|國家|哪國|哪一國/u.test(query)) {
        return (
          '這一刻我無法連上線上沙龍，先不在離線時臆測作答。\n\n你關心的是：「' +

          topic +
          '」好好陪你梳理。'
        );
      }
      let tail =
        '你剛才問的是：「' +
        topic +
        '」。請稍後再試，或確認網路連線。';
      if (opts.catchUnknown) {
        tail +=
          '\n\n若對話已經很長，可先點「新對話」再簡短提問，會比較順暢。';
      }
      return '目前無法連上線上沙龍。\n\n' + tail;
    }

    /** 中文註解：避免長對話時請求卡死；逾時後會走 catch 給較清楚提示 */
    function coachFetchWithDeadline(url, options, ms) {
      var ctrl = new AbortController();
      var tid = setTimeout(function () {
        ctrl.abort();
      }, ms || 45000);
      return fetch(url, Object.assign({}, options, { signal: ctrl.signal })).finally(function () {
        clearTimeout(tid);
      });
    }

    function buildCoachMessagesPayload(chat) {
      const list = chat && Array.isArray(chat.messages) ? chat.messages : [];
      // 中文註解：與後端預設歷史輪數對齊，減少 payload 與逾時（後端仍會再截到 GEMINI_HISTORY_MAX_TURNS）
      return list.slice(-16).map(function (m) {
        return {
          role: m.role === 'assistant' ? 'assistant' : 'user',
          content: typeof m.content === 'string' ? m.content : String(m.content || ''),
        };
      });
    }

      async function postOnce() {
        try {
          var resp = await coachFetchWithDeadline(
            '/api/coach-chat',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            },
            45000,
          );
          var raw = await resp.text();
          var data = null;
          try {
            data = raw ? JSON.parse(raw) : null;
          } catch (parseErr) {
            data = null;
          }
          return {
            okChain: true,
            resp: resp,
            data: data,
            rawSnippet: (raw || '').slice(0, 220),
          };
        } catch (netErr) {
          return {
            okChain: false,
            netMsg: String(netErr && netErr.message ? netErr.message : netErr),
            resp: null,
            data: null,
            rawSnippet: '',
          };
        }
      }

      try {
        var first = await postOnce();
        if (!first.okChain) {
          var ff = first.netMsg || '';
          var isFailFetch =
            ff.indexOf('Failed to fetch') !== -1 ||
            ff.indexOf('NetworkError') !== -1 ||
            ff.indexOf('Load failed') !== -1;
          return {
            text:
              (isFailFetch
                ? '目前無法連上沙龍，多半是網路或連線受到干擾（例如防火牆、VPN）。'
                : '連線過程被打斷了。') +
              '\n\n' +
              '請重新整理頁面後再試一次；若仍無法使用，可稍後再回來。\n\n你想談的是：「' +
              topicFromQuery(message) +
              '」。',
          };
        }

        var resp = first.resp;
        var data = first.data;
        // 中文註解：除錯用 raw body，須與下方 resp／data 同源（重試後改為 second）
        var activeRawSnippet = first.rawSnippet || '';

        // 中文註解：502／504／429 可能在多輪／尖峰時瞬發，僅自動重試一次
        if (
          resp.status === 502 ||
          resp.status === 504 ||
          resp.status === 429 ||
          resp.status === 503
        ) {
          await new Promise(function (r) {
            setTimeout(r, 900);
          });
          var second = await postOnce();
          if (!second.okChain) {
            return {
              text:
                '沙龍這片刻仍無法接通，請稍後再試。\n\n你想談的是：「' +
                topicFromQuery(message) +
                '」。',
            };
          }
          resp = second.resp;
          data = second.data;
          activeRawSnippet = second.rawSnippet || '';
        }

        if (!resp.ok || !data || typeof data.reply !== 'string' || !data.reply.trim()) {
          if (resp.status === 403) {
            const err403 = data && data.error ? String(data.error) : '';
            if (err403 === 'ACCESS_CODE_INVALID') {
              clearStoredAuth();
              openAuthPanel({
                email: '',
                passcode: '',
                errMsg: '通行碼與我們的紀錄不符，已請你重新登入。請輸入正確的專屬通行碼。',
                focusPass: true,
              });
              return {
                text:
                  '通行碼不正確，我已為你開啟登入畫面。請確認後再傳一次；需要協助可透過官方 LINE 聯繫小幫手。',
              };
            }
            if (err403 === 'EMAIL_NOT_APPROVED') {
              openAuthPanel({
                email: userEmail,
                passcode: accessCode,
                errMsg: '此信箱尚未開通權限，或登入時未填寫信箱。請改用報名時留下的信箱，或聯繫小幫手協助。',
                focusPass: false,
              });
              return {
                text:
                  '這組信箱尚未開通權限，我已為你開啟登入畫面。請確認信箱是否與報名時相同，或請小幫手為你核對。',
              };
            }
            openAuthPanel({
              errMsg: '無法完成驗證，請點右上角重新登入。',
            });
            return {
              text:
                '暫時無法完成驗證，我已為你開啟登入畫面。請點右上角調整通行碼或信箱後再試。',
            };
          }
          if (resp.status === 502 || resp.status === 500) {
            let hint502 =
              '沙龍這一刻無法回應，請稍後再試。\n\n你剛才想談的是「' +
              message.slice(0, 80) +
              (message.length > 80 ? '…' : '') +
              '」，連線順暢時歡迎再來。';
            const d502 = data && data.detail && typeof data.detail === 'string' ? data.detail : '';
            if (d502 && /429|quota|Quota exceeded|free_tier|limit: 0/i.test(d502)) {
              hint502 += '\n\n目前使用較為繁忙，請隔一會兒再傳一次。';
            }
            return { text: hint502 };
          }

          if (resp.status === 504 || resp.status === 408) {
            return {
              text:
                '這則訊息需要多一點時間整理，沙龍來不及在這一刻回完。\n\n請稍後再傳一次，或先點「新對話」簡短提問。\n\n你剛問：「' +
                message.slice(0, 120) +
                (message.length > 120 ? '…' : '') +
                '」。',
            };
          }

          // 中文註解：CDN／網關逾時
          if (resp.status === 524 || resp.status === 520 || resp.status === 522 || resp.status === 525) {
            return {
              text:
                '連線在等待中中斷了，較常發生在對話已經很長、又接一句短問的時候。\n\n請先點「新對話」，用一句話重問；或隔幾秒再傳。\n\n你剛問：「' +
                topicFromQuery(message) +
                '」。',
            };
          }

          if (resp.status === 429) {
            return {
              text:
                '步調太快了，請休息十餘秒再傳一次。\n\n你想談的是：「' +
                topicFromQuery(message) +
                '」。',
            };
          }

          if (resp.status === 413) {
            return {
              text:
                '內容份量太大，沙龍一下承接不住。請先點「新對話」，再分段、簡短提問。',
            };
          }

          if (resp.status === 404) {
            return {
              text:
                '此刻找不到對話入口，請重新整理頁面；若仍發生，請改從正式網址進入。',
            };
          }

          if (
            !resp.ok &&
            !data &&
            activeRawSnippet &&
            activeRawSnippet.indexOf('<!DOCTYPE') !== -1
          ) {
            return {
              text:
                '頁面連線有些錯位，請重新整理後再試一次。\n\n你想談的是：「' +
                topicFromQuery(message) +
                '」。',
            };
          }

          if (resp.ok && data && (typeof data.reply !== 'string' || !String(data.reply).trim())) {
            return {
              text:
                '沙龍有接到訊息，但這次沒有留下可閱讀的回覆。請稍後再試，或開一則「新對話」。',
            };
          }

          return {
            text:
              '這次無法完成對話，請稍後再試，或檢查網路後重新整理頁面。\n\n你想談的是：「' +
              topicFromQuery(message) +
              '」。',
          };
        }
        var prov = data.provider != null ? String(data.provider) : '';
        var live =
          data.mode === 'llm_live' &&
          prov !== 'fallback' &&
          String(data.model || '').indexOf('emergency-fallback') === -1 &&
          String(data.finishReason || '').indexOf('UPSTREAM_UNAVAILABLE') === -1;
        return {
          text: data.reply,
          mode: live ? 'llm_live' : 'fallback',
          provider: prov,
        };
      } catch (e) {
        var aborted = e && (e.name === 'AbortError' || String(e.message || '').indexOf('aborted') !== -1);
        if (aborted) {
          return {
            text:
              '等待時間較長，連線已暫停。\n\n請點「新對話」後簡短提問，或稍後再試。\n\n你想談的是：「' +
              topicFromQuery(message) +
              '」。',
          };
        }
        return { text: buildLocalFallback(message, hits, { catchUnknown: true }), mode: 'fallback' };
      }
    }

    async function sendMessage(raw) {
      if (busy) return;
      const text = (raw || inputEl.value || '').trim();
      if (!text) return;
      const chat = getActiveChat();
      if (!chat) return;

      busy = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      autoGrow();

      const userMsg = { role: 'user', content: text, ts: Date.now() };
      chat.messages.push(userMsg);
      chat.updatedAt = Date.now();
      saveChats();
      renderSidebar();
      renderMessages();

      addTyping();
      try {
        const reply = await askCoach(text);
        coachMode = reply.mode === 'llm_live' ? 'llm_live' : 'fallback';
        coachProvider = reply.provider || '';
        refreshModePill();
        chat.messages.push({ role: 'assistant', content: reply.text, ts: Date.now() });
        chat.updatedAt = Date.now();
        saveChats();
        renderSidebar();
        renderMessages();
      } catch (err) {
        // 中文註解：任何未預期例外都回覆可讀訊息，避免 busy 狀態卡死造成無法繼續送出。
        chat.messages.push({
          role: 'assistant',
          content:
            '剛剛這則訊息在處理時中斷了，請再送一次；若持續發生，先開「新對話」會更穩定。',
          ts: Date.now(),
        });
        chat.updatedAt = Date.now();
        saveChats();
        renderSidebar();
        renderMessages();
      } finally {
        removeTyping();
        busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    function showAuthMask(show) {
      authMaskEl.style.display = show ? 'flex' : 'none';
    }

    /** 中文註解：右上角狀態文字（可點進變更） */
    function refreshAuthPill() {
      let label = '請先登入';
      if (userEmail) {
        label = isNarrowLayout() ? '已登入' : userEmail.length > 18 ? userEmail.slice(0, 18) + '…' : userEmail;
      } else if (accessCode) {
        label = isNarrowLayout() ? '已登入' : '已登入 · 設定';
      }
      authPillEl.textContent = label;
      if (authSidebarBtnEl) authSidebarBtnEl.textContent = label;
    }

    /** 中文註解：清除本機登入狀態（通行碼錯誤時由伺服器觸發） */
    function clearStoredAuth() {
      try {
        localStorage.removeItem(AUTH_KEY);
      } catch (e) {}
      userEmail = '';
      accessCode = '';
      refreshAuthPill();
    }

    /** 中文註解：開啟登入卡並帶入目前記憶中的欄位，方便使用者修正 */
    function openAuthPanel(opts) {
      opts = opts || {};
      showAuthMask(true);
      emailInputEl.value = opts.email != null ? opts.email : userEmail || '';
      passcodeInputEl.value = opts.passcode != null ? opts.passcode : accessCode || '';
      if (opts.errMsg) {
        authErrEl.textContent = opts.errMsg;
      } else {
        authErrEl.textContent = '';
      }
      setTimeout(function () {
        (opts.focusPass !== false ? passcodeInputEl : emailInputEl).focus();
      }, 0);
    }

    function applyAuth(email, code) {
      userEmail = String(email || '').trim().toLowerCase();
      accessCode = String(code || '').trim();
      localStorage.setItem(AUTH_KEY, JSON.stringify({ userEmail, accessCode }));
      refreshAuthPill();
    }

    function bootAuth() {
      try {
        const raw = localStorage.getItem(AUTH_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        if (parsed && parsed.accessCode) {
          applyAuth(parsed.userEmail || '', parsed.accessCode);
          showAuthMask(false);
          return;
        }
      } catch (e) {}
      refreshAuthPill();
      showAuthMask(true);
    }

    emailSubmitEl.addEventListener('click', function () {
      const email = emailInputEl.value.trim();
      const code = passcodeInputEl.value.trim();
      if (!code) {
        authErrEl.textContent = '請輸入專屬通行碼。';
        return;
      }
      authErrEl.textContent = '';
      applyAuth(email, code);
      showAuthMask(false);
      inputEl.focus();
    });

    // 中文註解：右上角即「重新登入／變更通行碼」入口，避免已登入卻找不到重輸處
    authPillEl.addEventListener('click', function () {
      openAuthPanel({ errMsg: '' });
    });
    if (authSidebarBtnEl) {
      authSidebarBtnEl.addEventListener('click', function () {
        closeSidebarDrawer();
        openAuthPanel({ errMsg: '' });
      });
    }

    // 中文註解：眼睛按鈕—通行碼在 password/text 間切換；Email 在 email/password 間切換（可暫時隱藏字元）
    if (passEyeBtn && passcodeInputEl) {
      passEyeBtn.addEventListener('click', function () {
        passcodeInputEl.type = passcodeInputEl.type === 'password' ? 'text' : 'password';
      });
    }
    if (emailEyeBtn && emailInputEl) {
      emailEyeBtn.addEventListener('click', function () {
        emailInputEl.type = emailInputEl.type === 'password' ? 'email' : 'password';
      });
    }

    /** 中文註解：側欄與頂欄共用—開新線並關閉窄螢幕抽屜 */
    function startNewConversation() {
      createChat(true);
      closeSidebarDrawer();
      inputEl.focus();
    }

    newChatBtn.addEventListener('click', startNewConversation);
    if (newChatTopBtn) newChatTopBtn.addEventListener('click', startNewConversation);
    if (newChatFabBtn) newChatFabBtn.addEventListener('click', startNewConversation);
    if (chatListToggleBtn) chatListToggleBtn.addEventListener('click', toggleSidebarDrawer);
    if (sidebarFabBtn) sidebarFabBtn.addEventListener('click', toggleSidebarDrawer);
    if (sidebarBackdropEl) sidebarBackdropEl.addEventListener('click', closeSidebarDrawer);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeSidebarDrawer();
    });

    window.addEventListener('resize', function () {
      if (!isNarrowLayout()) closeSidebarDrawer();
    });

    sendBtn.addEventListener('click', function () {
      sendMessage();
    });

    inputEl.addEventListener('compositionstart', function () {
      composing = true;
    });
    inputEl.addEventListener('compositionend', function () {
      composing = false;
    });
    inputEl.addEventListener('input', autoGrow);
    inputEl.addEventListener('keydown', function (e) {
      if (composing || e.isComposing || e.keyCode === 229) return;
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    loadChats();
    renderSidebar();
    renderMessages();
    bootAuth();
    refreshModePill();
    autoGrow();

    // 中文註解：註冊 PWA Service Worker，讓網站可安裝到手機主畫面並離線顯示基本殼層
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register('/sw.js')
          .then(function (reg) {
            var refreshing = false;
            function forceActivateWaitingWorker() {
              if (reg.waiting) {
                reg.waiting.postMessage('SKIP_WAITING');
              }
            }
            reg.addEventListener('updatefound', function () {
              var installing = reg.installing;
              if (!installing) return;
              installing.addEventListener('statechange', function () {
                if (installing.state === 'installed') {
                  forceActivateWaitingWorker();
                }
              });
            });
            navigator.serviceWorker.addEventListener('controllerchange', function () {
              if (refreshing) return;
              refreshing = true;
              window.location.reload();
            });
            // 中文註解：主動檢查更新，縮短新版生效時間
            reg.update().catch(function () {});
            if (reg.waiting) forceActivateWaitingWorker();
          })
          .catch(function () {});
      });
    }
  </script>
</body>

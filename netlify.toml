[build]
  publish = "ai"
  functions = "netlify/functions"

# 中文註解：與前端統一走 /api/coach-chat，轉到 Netlify Function
[[redirects]]
  from = "/api/coach-chat"
  to = "/.netlify/functions/coach-chat"
  status = 200

# 中文註解：將 system prompt 檔一併打入函式部署包，執行時以 __dirname 讀取
[functions]
  included_files = ["maenads_system_prompt.md"]


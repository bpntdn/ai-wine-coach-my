# 中文註解：手動跑「大量抽樣」產出最差 N 題報告（artifact）。不自動改 prompt、不自動 deploy。
# Secrets：COACH_ACCESS_CODE；選 COACH_URL、COACH_MEGA_CAP（預設 workflow 內 120）

name: Coach mega sample report

on:
  workflow_dispatch:
    inputs:
      cap:
        description: '抽樣題數上限（勿填過大）'
        required: false
        default: '120'

jobs:
  mega:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 執行 mega sample
        env:
          COACH_URL: ${{ secrets.COACH_URL }}
          ACCESS_CODE: ${{ secrets.COACH_ACCESS_CODE }}
          COACH_MEGA_CAP: ${{ github.event.inputs.cap }}
          COACH_MEGA_ALLOW_LARGE: '1'
        run: |
          export COACH_URL="${COACH_URL:-https://ai.winemaenads.com/api/coach-chat}"
          if [ -z "$ACCESS_CODE" ]; then
            echo "::error::需要 Secret COACH_ACCESS_CODE"
            exit 1
          fi
          node scripts/coach-mega-sample.js

      - name: 上傳報告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coach-mega-reports-${{ github.run_id }}
          path: reports/mega-report-*
          if-no-files-found: ignore
